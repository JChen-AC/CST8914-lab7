<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Form validation with messages on top: Code example - Accessibility Developer Guide example</title>
        <meta charset="utf-8">
        <style>.control, fieldset {
      margin: 6px 0;
    }
    
    label {
      display: inline-block;
      width: 160px;
      vertical-align: top;
    }
    
    input + label {
      width: auto;
    }
    
    .errors, .required {
      color: red;
    }
    /* Added error_link and error_highlihgt styles*/
    .error_link{
      border: 2px solid red;
      background-color: #f3e9e8;
      color:black;
      padding: 10px;
    }
    .error_highlight{
      border: 2px solid red;
      background-color: #f3e9e8;
      padding: 10px;
    }
    
    fieldset ul {
      margin: 0;
    }</style>
    </head>
    <body>
        <h1>Feedback form</h1>
    <form>
        <div class="control">
          <label>Full name <span class="required">*(required)</span></label><input id="name" name="name" type="text" required placeholder="Enter Full Name"/> <!-- Add required attribute-->
        </div>
        <div class="control">
          <label>Biography<span class="required">*(required)</span></label><textarea id="biography" name="biography" type="text"  placeholder="Enter Biography" required ></textarea>
          <span for="biography">Include examples on your skills in JavaScript.</span>
        </div>
        <fieldset id="gender_group"> <!-- Move gender into a field set -->
          <legend> Gender <span class="required">*(required)</span> </legend>
          <div class="control">
            <input id="gender_male" name="gender" type="radio" value="male" required /><label for="gender_male"  >Male</label> <!-- Added for to gender label so screen reader can say the content-->
          </div>
          <div class="control">
            <input id="gender_female" name="gender" type="radio" value="female" /><label for="gender_female">Female</label> <!-- Added for to gender label so screen reader can say the content-->
          </div>
        </fieldset>
        <div class="control">
          <input id="accept_agbs" name="accept_agbs" type="checkbox" value="1" required /><label for="accept_agbs" >I accept the terms and conditions <span class="required">*(required)</span> </label> <!-- Added for to gender label so screen reader can say the content-->
        </div>
        <div class="control">
          <input name="validate" type="hidden" value="1" /><input type="submit" value="Register" />
        </div>
      </form>
      
          <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js" integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8=" crossorigin="anonymous"></script>
          <script>"use strict";
      
      ;
      (function () {
        var validateInput;
      
        $.urlParam = function (name) {
          var results;
          results = new RegExp('[?&]' + name + '=([^&#]*)').exec(window.location.href);
      
          if (results === null) {
            return null;
          } else {
            return decodeURI(results[1]) || null;
          }
        };
      
        validateInput = function validateInput(input, message) {
          var $elementToDescribe, $error, $errorContainer, $fieldset, $input, $referencedElement, value;
          $input = $('[name="' + input + '"]');
      
          if ((value = $.urlParam(input)) === null) {
            if ($('fieldset.errors').length === 0) {
              $('form').prepend('<fieldset class="errors error_link"><legend>Errors</legend><ul></ul></fieldset>');
            }
      
            $referencedElement = null;
            $elementToDescribe = null;
            $errorContainer = $('fieldset.errors ul');
      
            if ($input.is(':radio')) {
              $fieldset = $input.closest('fieldset');
              $elementToDescribe = $fieldset;
              $referencedElement = $input.filter(':first');
            } else {
              $elementToDescribe = $input;
              $referencedElement = $input;
            }
      // R.G. hint: fix next line ;)

            // Added 
            var err_link;
            if(input === 'accept_agbs'){
              err_link = "terms and conditions";
            }
            else{
              err_link = input;
            }            
            // Added style, to the tab index and updated screen reader message
            $error = $('<a tabindex=0 href="#'+ input +'" aria-label="'+message + ' Go to ' +err_link+'">' + message + '</a>'); // NEED TO HAVE THE THING CHANGE FOCUS TO THE ELEMENT THAT IS ERRORING 
            // Added error style to elements that are missing 
            if(input === 'gender' ){
              $('#gender_group').addClass('error_highlight');
            }
            else if(input === 'accept_agbs'){
              $('#accept_agbs').closest('.control').addClass('error_highlight');

            }
            else{
              $('#' + input).addClass('error_highlight'); 
            }

            // End of updated code 

            $error.click(function (e) {
              // If we rely on the link's href pointing to the input's ID, it doesn't trigger forms mode in screen readers
              $referencedElement.focus();
              return e.preventDefault();
            });
            $elementToDescribe.attr('aria-describedby', input + '_description');
            $errorContainer.append('<li class="errors">').find('li:last').append($error);
              
            if ($(':not(form):focus').length === 0) {
              // See https://stackoverflow.com/questions/46134247/jquery-setting-focus-doesnt-work-in-ie11/
              
              // Added focus on the error area
              $('fieldset.errors a').first().focus(); // focus on the first link of the error list
            }
          } else {
            // Remove error style to elements that are missing 
            if(input === 'gender' ){
              $('#gender_group').removeClass('error_highlight');
            }
            else if(input === 'accept_agbs'){
              $('#accept_agbs').closest('.control').removeClass('error_highlight');

            }
            else{
              $('#' + input).removeClass('error_highlight'); 
            }

            if ($input.is(':checkbox')) {
              $input.attr('checked', true);
            }
      
            if ($input.is(':radio')) {
              return $input.filter('[value="' + value + '"]').attr('checked', true);
            } else {
              return $input.val(value);
            }
          }
        };
      
        $(document).ready(function () {
          if ($.urlParam('validate')) {
            // Changed the messages to be more descriptive for screen reader 
            validateInput('name', 'Name not found. Please enter your name! (This field is required).');
            validateInput('biography', 'Biography not found. Please tell us something about your history! (This field is required).');
            validateInput('gender', 'Gender not selected. Please tell us your gender! (This field is required).');
            validateInput('accept_agbs', 'Terms and conditions not accepted. You must accept our terms and conditions! (This field is required).');
      
            if ($('.errors li').length === 0) { // Fixed variable name error, changing .error to errors so that it can actually look to see if there are any errors
              return alert('All inputs are valid.');
            }
          }
        });
      }).call(void 0);</script>
                
        </body>
      </html>
